name: CI

on:
  push:
    branches: [main, 'refactor/**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run lint

      - name: ESLint
        run: npm run lint:eslint

      - name: Testes (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
